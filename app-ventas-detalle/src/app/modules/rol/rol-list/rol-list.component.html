<div class="p-4 mt-6 bg-gradient-to-br from-gray-900 via-black to-blue-900 text-white rounded-2xl shadow-2xl border border-blue-500/30">
  <h2 class="text-3xl font-extrabold mb-6 text-center bg-gradient-to-r from-blue-400 via-blue-600 to-cyan-500 bg-clip-text text-transparent">
    Lista de Roles
  </h2>

  <div class="flex justify-end mb-3">
    <button (click)="createRole()"
      class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-md transition-transform transform hover:scale-105 text-sm">
      ➕ Crear Rol
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full table-auto text-xs text-center bg-gray-900/80 rounded-xl shadow-xl border border-gray-700">
      <thead>
        <tr class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white">
          <th class="px-4 py-2 text-left">Nombre</th>
          <th class="px-4 py-2 text-left">Permisos</th>
          <th class="px-4 py-2 text-left">Estado</th>
          <th class="px-4 py-2 text-left">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let rol of roles"
          class="hover:bg-gray-800 transition-colors border-b border-gray-700">
          <td class="px-4 py-3 font-semibold text-left">{{ rol.nombre_Rol }}</td>
          <td class="px-4 py-3 text-left">
            <div class="flex flex-wrap gap-1">
              <ng-container *ngIf="rol.permisos && rol.permisos.length > 0; else noPermisos">
                <span *ngFor="let p of rol.permisos"
                  class="px-2 py-0.5 bg-blue-600/30 text-blue-300 rounded text-xs">
                  {{ p.nombre_Permiso }}
                </span>
              </ng-container>
              <ng-template #noPermisos>
                <span class="text-gray-400 text-xs">Sin permisos</span>
              </ng-template>
            </div>
          </td>
          <td class="px-4 py-3 text-left">
            <span [ngClass]="rol.estado === 'activo' ? 'text-green-400' : 'text-red-400'">
              {{ rol.estado || 'activo' }}
            </span>
          </td>
          <td class="px-4 py-3 text-left flex gap-2">
            <button (click)="asignarPermiso(rol)"
              class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded transition text-xs">
              + Permiso
            </button>
            <button (click)="cambiarEstado(rol)"
              [ngClass]="rol.estado === 'activo' ? 'bg-orange-500 hover:bg-orange-600' : 'bg-green-500 hover:bg-green-600'"
              class="text-white px-3 py-1 rounded transition text-xs">
              {{ rol.estado === 'activo' ? 'Desactivar' : 'Activar' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
