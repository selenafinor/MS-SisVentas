<div class="p-6 mt-10 bg-gradient-to-br from-gray-900 via-black to-blue-900 text-white rounded-2xl shadow-2xl border border-blue-500/30">
  <h2 class="text-4xl font-extrabold mb-8 text-center bg-gradient-to-r from-blue-400 via-blue-600 to-cyan-500 bg-clip-text text-transparent">
    Lista de Egresos
  </h2>

  <div class="flex justify-end mb-4">
    <button (click)="crearEgreso()"
      class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-md transition-transform transform hover:scale-105">
      ➕ Crear Egreso
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full table-auto text-sm text-center bg-gray-900/80 rounded-xl shadow-xl border border-gray-700">
      <thead>
        <tr class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white">
          <th class="px-5 py-2 text-left">Fecha</th>
          <th class="px-5 py-2 text-left">Motivo</th>
          <th class="px-5 py-2 text-left">Usuario</th>
          <th class="px-5 py-2 text-left">Estado</th>
          <th class="px-5 py-2 text-left">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let egreso of egresos"
          class="hover:bg-gray-800 transition-colors border-b border-gray-700">
          <td class="px-6 py-4">{{ egreso.fecha | date:'dd/MM/yyyy' }}</td>
          <td class="px-6 py-4">{{ egreso.motivo }}</td>
          <td class="px-6 py-4">{{ username }}</td>
          <td class="px-6 py-4">
            <span [ngClass]="egreso.estado === 'activo' ? 'text-green-400' : 'text-red-400'">
              {{ egreso.estado }}
            </span>
          </td>
          <td class="px-6 py-4 flex gap-2">
            <button (click)="verDetalle(egreso.id!)"
              class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded-md transition duration-300">
              Ver detalle
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
