<div class="p-6 mt-10 bg-gradient-to-br from-gray-900 via-black to-blue-900 text-white rounded-2xl shadow-2xl border border-blue-500/30 max-w-2xl mx-auto">
  <h2 class="text-3xl font-extrabold mb-8 text-center bg-gradient-to-r from-blue-400 via-blue-600 to-cyan-500 bg-clip-text text-transparent">
    🚀 Crear Almacén
  </h2>

  <form [formGroup]="almacenForm" (ngSubmit)="createAlmacen()" class="grid grid-cols-2 gap-6">

    <div class="flex flex-col gap-1">
      <label class="text-sm text-gray-400">Nombre *</label>
      <input formControlName="nombre" type="text" placeholder="Ej: Almacén Central"
        class="bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"/>
      <span *ngIf="almacenForm.get('nombre')?.invalid && almacenForm.get('nombre')?.touched"
        class="text-red-400 text-xs">⚠️ El nombre es requerido.</span>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm text-gray-400">Descripción</label>
      <input formControlName="descripcion" type="text" placeholder="Ej: Almacén principal"
        class="bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"/>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm text-gray-400">Dirección</label>
      <input formControlName="direccion" type="text" placeholder="Ej: Av. Principal #123"
        class="bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"/>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm text-gray-400">Capacidad Máx</label>
      <input formControlName="cantidadMax" type="number" placeholder="Ej: 1000"
        class="bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"/>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm text-gray-400">Estado</label>
      <select formControlName="estado"
        class="bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500">
        <option value="activo">Activo</option>
        <option value="inactivo">Inactivo</option>
      </select>
    </div>

    <div class="col-span-2 flex justify-center gap-4 mt-4">
      <button type="submit" [disabled]="almacenForm.invalid"
        class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-md transition disabled:opacity-50">
        ➕ Agregar Almacén
      </button>
      <button type="button" (click)="cancelar()"
        class="px-6 py-2 bg-gray-600 hover:bg-gray-500 text-white font-semibold rounded-lg shadow-md transition">
        Cancelar
      </button>
    </div>

  </form>
</div>
