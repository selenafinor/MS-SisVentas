<div class="p-6">

  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-2xl font-bold text-gray-200">Gestión de Clientes</h2>
      <p class="text-gray-400 text-sm">Administrá los clientes del sistema</p>
    </div>
    <a routerLink="/dashboard/customer/list"
       class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-semibold transition">
      ← Ver lista
    </a>
  </div>

  <div class="bg-gray-800 rounded-xl shadow-lg p-8 max-w-2xl mx-auto">
    <h3 class="text-xl font-bold text-center text-gray-200 mb-6">Nuevo Cliente</h3>

    <div *ngIf="errorMessage" class="bg-red-900 text-red-300 p-3 rounded-lg mb-4 text-sm">
      {{ errorMessage }}
    </div>

    <div class="mb-4">
      <label class="block text-gray-400 font-semibold mb-1">Nombre *</label>
      <input [(ngModel)]="nombre" name="nombre" type="text"
             class="w-full p-3 rounded-md bg-gray-700 border-2 border-gray-600 text-gray-200 focus:border-blue-500 focus:outline-none" />
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-gray-400 font-semibold mb-1">Paterno</label>
        <input [(ngModel)]="paterno" name="paterno" type="text"
               class="w-full p-3 rounded-md bg-gray-700 border-2 border-gray-600 text-gray-200 focus:border-blue-500 focus:outline-none" />
      </div>
      <div>
        <label class="block text-gray-400 font-semibold mb-1">Materno</label>
        <input [(ngModel)]="materno" name="materno" type="text"
               class="w-full p-3 rounded-md bg-gray-700 border-2 border-gray-600 text-gray-200 focus:border-blue-500 focus:outline-none" />
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-gray-400 font-semibold mb-1">Teléfono</label>
        <input [(ngModel)]="telefono" name="telefono" type="text"
               class="w-full p-3 rounded-md bg-gray-700 border-2 border-gray-600 text-gray-200 focus:border-blue-500 focus:outline-none" />
      </div>
      <div>
        <label class="block text-gray-400 font-semibold mb-1">CI / NIT</label>
        <input [(ngModel)]="nit" name="nit" type="text"
               class="w-full p-3 rounded-md bg-gray-700 border-2 border-gray-600 text-gray-200 focus:border-blue-500 focus:outline-none" />
      </div>
    </div>

    <div class="mb-4">
      <label class="block text-gray-400 font-semibold mb-1">Correo</label>
      <input [(ngModel)]="correo" name="correo" type="email"
             class="w-full p-3 rounded-md bg-gray-700 border-2 border-gray-600 text-gray-200 focus:border-blue-500 focus:outline-none" />
    </div>

    <div class="mb-6">
      <label class="block text-gray-400 font-semibold mb-1">Dirección</label>
      <input [(ngModel)]="direccion" name="direccion" type="text"
             class="w-full p-3 rounded-md bg-gray-700 border-2 border-gray-600 text-gray-200 focus:border-blue-500 focus:outline-none" />
    </div>

    <div class="flex gap-3">
      <button type="button" (click)="onSubmit()"
              class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg font-bold transition">
        Crear Cliente
      </button>
      <a routerLink="/dashboard/customer/list"
         class="bg-gray-600 hover:bg-gray-500 text-gray-200 px-6 py-3 rounded-lg font-bold transition">
        Cancelar
      </a>
    </div>
  </div>

</div>
