<div class="p-6 mt-10 bg-gradient-to-br from-gray-900 via-black to-blue-900 text-white rounded-2xl shadow-2xl border border-blue-500/30 max-w-xl mx-auto">
  <h2 class="text-3xl font-extrabold mb-8 text-center bg-gradient-to-r from-blue-400 via-blue-600 to-cyan-500 bg-clip-text text-transparent">
    ➕ Nuevo Permiso
  </h2>

  <form [formGroup]="permisoForm" (ngSubmit)="crearPermiso()" class="flex flex-col gap-4">

    <div class="flex flex-col gap-1">
      <label class="text-sm text-gray-400">Nombre *</label>
      <input formControlName="nombre_Permiso" type="text" placeholder="Ej: gestionar_ventas"
        class="bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"/>
      <span *ngIf="permisoForm.get('nombre_Permiso')?.invalid && permisoForm.get('nombre_Permiso')?.touched"
        class="text-red-400 text-xs">⚠️ El nombre es requerido.</span>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-sm text-gray-400">Descripción</label>
      <input formControlName="descripcion" type="text" placeholder="Ej: Gestionar ventas del sistema"
        class="bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"/>
    </div>

    <div class="flex justify-center gap-4 mt-4">
      <button type="submit" [disabled]="permisoForm.invalid"
        class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-md transition disabled:opacity-50">
        Guardar
      </button>
      <button type="button" (click)="volver()"
        class="px-6 py-2 bg-gray-600 hover:bg-gray-500 text-white font-semibold rounded-lg shadow-md transition">
        Volver
      </button>
    </div>

  </form>
</div>
