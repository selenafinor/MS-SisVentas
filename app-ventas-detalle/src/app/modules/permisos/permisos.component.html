<div class="p-4 mt-6 bg-gradient-to-br from-gray-900 via-black to-blue-900 text-white rounded-2xl shadow-2xl border border-blue-500/30">
  <h2 class="text-3xl font-extrabold mb-6 text-center bg-gradient-to-r from-blue-400 via-blue-600 to-cyan-500 bg-clip-text text-transparent">
    Lista de Permisos
  </h2>

  <div class="flex justify-end mb-3">
    <button (click)="crearPermiso()"
      class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-md transition-transform transform hover:scale-105 text-sm">
      ➕ Nuevo Permiso
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full table-auto text-xs text-center bg-gray-900/80 rounded-xl shadow-xl border border-gray-700">
      <thead>
        <tr class="bg-gradient-to-r from-blue-600 to-cyan-500 text-white">
          <th class="px-4 py-2 text-left">Nombre</th>
          <th class="px-4 py-2 text-left">Descripción</th>
          <th class="px-4 py-2 text-left">Estado</th>
          <th class="px-4 py-2 text-left">Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let permiso of permisos"
          class="hover:bg-gray-800 transition-colors border-b border-gray-700">
          <td class="px-4 py-3 font-semibold text-left">{{ permiso.nombre_Permiso }}</td>
          <td class="px-4 py-3 text-left">{{ permiso.descripcion }}</td>
          <td class="px-4 py-3 text-left">
            <span class="text-green-400">activo</span>
          </td>
          <td class="px-4 py-3 text-left">
            <button (click)="eliminarPermiso(permiso.iD_Permiso!)"
              class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded transition text-xs">
              Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
